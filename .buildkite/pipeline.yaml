steps:
  - label: ":docker: Build and Run Tests"
    commands:
      - docker build -t pytest-bdd:latest .
      - docker run --rm pytest-bdd:latest

    agents:
      queue: "linux-small"

    plugins:
      - docker#v5.13.0:
          image: "docker:latest"
          always-pull: true
          volumes:
            - "/var/run/docker.sock:/var/run/docker.sock"