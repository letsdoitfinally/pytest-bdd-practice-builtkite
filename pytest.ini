[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── pytest-bdd ─────────────────────────────────────────────────────────────────
bdd_features_base_dir = features

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ── Custom markers ─────────────────────────────────────────────────────────────
markers =
    smoke:      Fast, critical-path tests that must always pass
    regression: Full regression suite
    coupon:     Tests related to discount/coupon functionality
    inventory:  Tests related to stock management
